<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elio | Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

nav{
position:fixed;
top:0;
width:100%;
padding:15px 30px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,.6);
}

nav a{
color:white;
text-decoration:none;
margin-left:15px;
}

section{
max-width:900px;
margin:auto;
padding:100px 20px;
}

.hero{
padding-top:150px;
text-align:center;
}

.hero h1{
font-size:55px;
}

.hero p{
color:#94a3b8;
margin-top:10px;
}

.card{
background:rgba(255,255,255,.05);
padding:25px;
border-radius:15px;
margin-top:20px;
}

h2{
color:#38bdf8;
margin-bottom:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
margin-top:15px;
}

footer{
text-align:center;
padding:30px;
color:#94a3b8;
}
</style>
</head>

<body>

<nav>
<div><b>Elio</b></div>
<div>
<a href="#about">About</a>
<a href="#tennis">Tennis</a>
<a href="#goals">Goals</a>
</div>
</nav>

<section class="hero">
<h1>Elio</h1>
<p>Student • Athlete • Growth Focused</p>
<button onclick="motivate()">Motivate Me</button>
<p id="quote"></p>
</section>

<section id="about">
<h2>About Me</h2>
<div class="card">
Focused on school, tennis, discipline, and building a strong future.
</div>
</section>

<section id="tennis">
<h2>Tennis</h2>
<div class="card">
Competitive player who loves training, improvement, and performance.
</div>
</section>

<section id="goals">
<h2>Goals</h2>
<div class="card">
Improve daily. Stay disciplined. Win long term.
</div>
</section>

<footer>
Built by Elio 🚀
</footer>

<script>
function motivate(){
const quotes = [
"Discipline beats motivation.",
"Pressure builds champions.",
"Consistency wins.",
"Small steps become big results.",
"Future you is watching."
];

document.getElementById("quote").innerText =
quotes[Math.floor(Math.random()*quotes.length)];
}
</script>

</body>
</html>
